<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Rei das Motos Elétricas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: #020617;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .container {
      padding: 40px 20px;
    }

    .card {
      background: #111827;
      border-radius: 15px;
      padding: 20px;
      max-width: 350px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #22c55e;
      font-size: 22px;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    <h1>⚡ Rei das Motos Elétricas</h1>
    <p>Economize na gasolina e ande com estilo 🔥</p>
  </header>

  <div class="container">
    <div class="card">

      <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2" alt="Moto elétrica">

      <h2>Modelo Urban 2026</h2>

      <p>🔋 Até 60km de autonomia</p>
      <p>⚡ Recarga rápida</p>

      <p class="price">💸 R$ 6.990</p>

      <a href="https://wa.me/55SEUNUMERO">
        <button>Falar no WhatsApp</button>
      </a>

    </div>
  </div>

  <footer>
    © 2026 Rei das Motos Elétricas - Todos os direitos reservados
  </footer>

</body>
</html>
